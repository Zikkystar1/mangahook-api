<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Hook · simple reader</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app-container">
    <!-- top bar -->
    <div class="toolbar">
        <div class="logo">
            <h2>mangahook <span>reader</span></h2>
        </div>
        <div class="search-wrap">
            <div class="search-group">
                <input type="text" id="searchInput" placeholder="Search manga by title..." value="">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="action-buttons">
            <button class="btn-icon" id="refreshBtn" title="Refresh manga list"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <!-- connection status -->
    <div id="connectionStatus" class="connection-status"></div>

    <!-- manga grid -->
    <div id="mangaGrid" class="manga-grid"></div>
    <div id="loading" class="loading-indicator"><i class="fas fa-spinner fa-pulse"></i> loading manga...</div>
    <div id="errorMessage" class="error-message" style="display: none;"></div>

    <div class="footer-meta">
        ⚡ powered by Manga Hook API · <a href="https://github.com/kiraaziz/mangahook-api" target="_blank">GitHub</a>
    </div>
</div>

<!-- fixed up/down buttons -->
<div class="float-nav">
    <button class="btn-float" id="scrollUpBtn" title="scroll up"><i class="fas fa-chevron-up"></i></button>
    <button class="btn-float" id="scrollDownBtn" title="scroll down"><i class="fas fa-chevron-down"></i></button>
</div>

<!-- JavaScript -->
<script src="/script.js"></script>
</body>
</html>
